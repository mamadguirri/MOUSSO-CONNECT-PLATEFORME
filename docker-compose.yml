version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musso_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: musso
      POSTGRES_PASSWORD: musso_dev_password
      POSTGRES_DB: musso_connect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
